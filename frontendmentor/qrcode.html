<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Component</title>
    <link rel="stylesheet" href="qrcode.css">
</head>
<body>
    <div class="qr-container">
        <div class="qr-card">
            <img src="images/image-qr-code.png" class="qr-img" alt="Qr Code">
            <h1><b>Improve your front-end skills by building projects</b></h1>
            <h5>Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</h5>
        </div>
    </div>
</body>
</html>
